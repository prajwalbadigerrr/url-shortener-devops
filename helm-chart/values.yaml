# values.yaml
# All configurable values for our app
# Change these without touching the actual Kubernetes configs

replicaCount: 2  # Run 2 copies of our app for high availability

image:
  repository: ghcr.io/prajwalbadigerrr/url-shortener-devops
  tag: latest
  pullPolicy: Always  # ← This forces fresh pull every time

service:
  type: NodePort   # Exposes app outside the cluster
  port: 5000

resources:
  limits:
    cpu: 500m       # Max half a CPU core
    memory: 128Mi   # Max 128MB RAM
  requests:
    cpu: 100m       # Guaranteed 10% of a CPU core
    memory: 64Mi    # Guaranteed 64MB RAM

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70  # Scale up if CPU > 70%

health:
  path: /health
  port: 5000